{% extends "_base.html" %} 

{% block conteudo %}
<div class="container mt-2">
    
    <div class="header-main">
        <h1><i class="smw-icon icon-edit"></i> Editar Jogo</h1>
    </div>

    <div class="divider-level"></div>

    {% if erro %}
    <div class="alert alert-error">
        <i class="smw-icon icon-boo"></i>
        <span><strong>Erro:</strong> {{ erro }}</span>
    </div>
    {% endif %}

    <form action="jogos_editar.php" method="post" enctype="multipart/form-data" class="form-crud">
        
        <input type="hidden" name="id" value="{{ jogo.id }}">
        
        <div class="form-group">
            <label class="form-label" for="nome">
                <i class="smw-icon icon-coin"></i> Nome do Jogo
            </label>
            <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome do Jogo" value="{{ jogo.nome }}" />
        </div>
        
        <div class="form-group">
            <label class="form-label" for="estilo">
                <i class="smw-icon icon-fireflower"></i> Estilo
            </label>
            <select name="estilo" id="estilo" class="form-control">
                <option value="acao" {% if jogo.estilo == 'acao' %}selected{% endif %}>Ação</option>
                <option value="tiro" {% if jogo.estilo == 'tiro' %}selected{% endif %}>Tiro</option>
                <option value="rpg" {% if jogo.estilo == 'rpg' %}selected{% endif %}>RPG</option>
            </select>
        </div>
        
          <div class="form-group">
          <label class="form-label" for="lancamento">
              <i class="smw-icon icon-castle"></i> Data de Lançamento
          </label>
          <input type="date" name="lancamento" id="lancamento" class="form-control" value="{{ jogo.lancamento }}" />
        </div>

        <div class="form-group" style="align-items: flex-start;">
            <label class="form-label">
                <i class="smw-icon icon-castle"></i> Capa Atual
            </label>
            {% if jogo.capa %}
                <img src="img/{{ jogo.capa }}" alt="Capa atual do jogo" class="capa-preview">
            {% else %}
                <div class="capa-preview" style="display:flex; align-items:center; justify-content:center; background:#000; color:#FFF; padding:20px; font-family: var(--font-snes-title);">Sem Capa</div>
            {% endif %}
        </div>

        <div class="form-group">
            <label class="form-label">
                <i class="smw-icon icon-star"></i> Atualizar Capa (Opcional)
            </label>
            
            <div class="form-file-wrapper">
                <div class="file-custom-btn">
                    <i class="smw-icon icon-add"></i> Escolher Nova Imagem...
                </div>
                <input type="file" name="capa" id="capa" accept="image/*">
            </div>
        </div>
        
        <div class="nav-actions mt-3" style="justify-content: flex-end; background: transparent; border: none; padding: 0;">
            <a href="jogos.php" class="btn btn-warning" style="margin-right: var(--sp-3);">
                Voltar
            </a>
            <button type="submit" class="btn btn-info">
                <i class="smw-icon icon-save"></i> Atualizar Jogo
            </button>
        </div>

    </form>
</div>
{% endblock %}
